name: flutter_food_delivery_ui
description: A complete Flutter food delivery app UI kit with restaurant ordering flow.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  google_fonts: ^6.1.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  http: ^1.2.0          # ← add this


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/onboarding/
    - assets/images/food/
    - assets/icons/
    - assets/images/logo_icon.png
    - assets/images/logo_full.png